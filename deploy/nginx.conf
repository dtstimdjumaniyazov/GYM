server {
    listen 80;
    server_name fitevolution.uz www.fitevolution.uz;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name fitevolution.uz www.fitevolution.uz;

    ssl_certificate     /etc/letsencrypt/live/fitevolution.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fitevolution.uz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 100M;

    # React frontend (built files)
    root /var/www/gym/frontend;
    index index.html;

    # API → gunicorn
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Django admin
    location /admin/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Django static (collected via collectstatic)
    location /static/ {
        alias /var/www/gym/backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Media files (user uploads)
    location /media/ {
        alias /var/www/gym/backend/media/;
        expires 7d;
    }

    # React SPA — все остальные пути → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
